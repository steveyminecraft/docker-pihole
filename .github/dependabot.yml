---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/London
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Europe/London
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - pre-commit
