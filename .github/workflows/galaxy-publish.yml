---
name: Validate role for Ansible Galaxy

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: galaxy-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate steveyminecraft.docker-pihole
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install galaxy-importer
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade 'ansible-core>=2.20.5,<2.21' galaxy-importer

      - name: Validate legacy role with galaxy-importer
        run: |
          cd ..
          python -m galaxy_importer.main --legacy-role --namespace steveyminecraft "${GITHUB_REPOSITORY#*/}"
