---
# Same layout as ansible-pihole: lint job, then syntax/tests. This repo is a single
# role at the root, so ansible-lint targets the project directory.
name: CI - Docker-Pihole Checks

"on":
  push:
    branches:
      - dev
      - master
      - "feature/**"
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

env:
  # Track the newest supported CPython on GitHub runners.
  python_version: "3.x"
  # Opt into Node.js 24 for GitHub Actions (silences Node 20 deprecation warnings).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  lint:
    name: Ansible & YAML lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.python_version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade ansible-core ansible-lint yamllint

      - name: Install Galaxy roles and collections
        run: ./scripts/install-ansible-collections.sh

      - name: Ansible Lint
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
        run: |
          ansible --version
          ansible-lint --version
          ansible-lint -p .

      - name: YAML lint
        run: yamllint .

  # Same job id/name as ansible-pihole. This role does not run --check in CI
  # because it needs Docker / a target host; use tests/local-test.yml locally.
  ansible-tests-ubuntu:
    name: Ansible syntax & dry-run
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.python_version }}

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade ansible-core

      - name: Show Ansible version
        run: ansible --version

      - name: Install Galaxy roles and collections
        run: ./scripts/install-ansible-collections.sh

      - name: Syntax check playbooks
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
          ANSIBLE_ROLES_PATH: "${{ github.workspace }}/..:${{ github.workspace }}"
        run: |
          ansible-playbook -i tests/inventory tests/syntax-check.yml --syntax-check
