---
# Same layout as ansible-pihole: lint job, then syntax/tests. This repo is a single role
# at the root (no roles/ playbooks/ tree); ansible-lint target is the project directory.
name: CI - docker-pihole

"on":
  push:
    branches:
      - dev
      - master
      - "feature/**"
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

env:
  python_version: 3.12

jobs:
  lint:
    name: Ansible & YAML lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core==2.20.1" "ansible-lint==25.12.1" "yamllint==1.37.1"

      - name: Install Galaxy roles and collections
        run: ./scripts/install-ansible-collections.sh

      - name: Ansible Lint
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
        run: |
          ansible --version
          ansible-lint --version
          ansible-lint -p .

      - name: YAML lint
        run: yamllint .

  # Same job id/name as ansible-pihole; that repo also runs bootstrap --check here.
  # This role does not run --check in CI (needs Docker / target host); use tests/local-test.yml locally.
  ansible-tests-ubuntu:
    name: Ansible syntax & dry-run
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Show Ansible version
        run: ansible --version

      - name: Install Galaxy roles and collections
        run: ./scripts/install-ansible-collections.sh

      - name: Syntax check playbooks
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
          ANSIBLE_ROLES_PATH: "${{ github.workspace }}/..:${{ github.workspace }}"
        run: |
          ansible-playbook -i tests/inventory tests/syntax-check.yml --syntax-check
